<div class="h-[100dvh] w-full bg-bg-base flex flex-col overflow-hidden">
  <!-- Header (Hidden in Full Screen) -->
  @if (!uiService.isFullScreen()) {
    <header class="bg-bg-surface text-text-heading shadow-sm p-4 flex justify-between items-center border-b border-gray-200 shrink-0">
      <div class="flex items-center space-x-2">
        <a routerLink="/" class="hover:opacity-80 transition-opacity">
          <h1 class="text-xl font-black tracking-tight uppercase">Trackingfy</h1>
        </a>
        @if (!isOnline()) {
          <span class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded uppercase font-bold">Offline</span>
        }
      </div>
      <div class="flex items-center space-x-6 font-semibold">
        @if (deferredPrompt()) {
          <button (click)="installPwa()" class="text-accent text-xs uppercase font-black hover:underline">Install App</button>
        }
        <a routerLink="/history" routerLinkActive="text-accent" class="hover:text-accent transition-colors">History</a>
      </div>
    </header>
  }

  <!-- Main Content Area -->
  <main class="flex-1 overflow-hidden relative">
    <div class="h-full w-full overflow-y-auto">
      <div 
        class="h-full w-full mx-auto"
        [ngClass]="uiService.isFullScreen() ? 'max-w-none p-0' : 'max-w-4xl p-4 md:p-6'"
      >
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>

  <!-- Global Confirmation Modal -->
  @if (uiService.confirmation(); as config) {
    <div class="fixed inset-0 z-[100000] flex items-center justify-center p-4">
      <!-- Backdrop -->
      <div 
        class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity"
        (click)="uiService.resolveConfirm(false)"
      ></div>
      
      <!-- Modal Content -->
      <div class="relative bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden transform transition-all border border-gray-100">
        <div class="p-6">
          <h3 class="text-xl font-black text-gray-900 mb-2 uppercase tracking-tight">
            {{ config.title }}
          </h3>
          <p class="text-gray-600 leading-relaxed">
            {{ config.message }}
          </p>
        </div>
        
        <div class="flex p-4 gap-3 bg-gray-50">
          <button 
            (click)="uiService.resolveConfirm(false)"
            class="flex-1 px-4 py-3 rounded-xl font-bold text-gray-600 hover:bg-gray-200 transition-colors uppercase text-sm"
          >
            {{ config.cancelText }}
          </button>
          <button 
            (click)="uiService.resolveConfirm(true)"
            [class]="config.type === 'danger' ? 
              'flex-1 px-4 py-3 rounded-xl font-bold bg-red-500 text-white hover:bg-red-600 shadow-lg shadow-red-200 transition-all uppercase text-sm' : 
              'flex-1 px-4 py-3 rounded-xl font-bold bg-accent text-white hover:bg-accent/90 shadow-lg shadow-accent/20 transition-all uppercase text-sm'"
          >
            {{ config.confirmText }}
          </button>
        </div>
      </div>
    </div>
  }

</div>
